name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Desktop control is Windows-only; coding/browser run cross-platform.
        # Windows is the primary target, Ubuntu guards portability of the core.
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.12"]

    env:
      # Qt has no display on CI runners - render off-screen so the capsule
      # widgets can be imported/instantiated headlessly during tests.
      QT_QPA_PLATFORM: offscreen
      # Tests must never reach a real provider. A dummy key keeps imports happy;
      # network calls are mocked in the suite.
      OPENROUTER_API_KEY: test-key-ci
      AGENT_API_KEY: test-api-key-12345

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        run: python -m pytest -q
