name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I asked the capsule to "..." and instead it...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Floating capsule (start.bat)
        - Dashboard (start_dashboard.bat)
        - Web (start_web.bat)
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Which mode?
      options: [Desktop (UIA), Coding, Browser, Chat, Not sure]
  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error output. Logs are rendered as code automatically.
      render: shell
