[pytest]
# Only run the unit-test suite in tests/ by default.
# The root-level files (e2e_test.py, test_model.py, test_delegation.py)
# start real HTTP servers and make live API calls - they hammer RAM/CPU
# and should only be run explicitly when the app server is already running.
testpaths = tests

# Marks for selectively skipping heavy test categories
markers =
    e2e: end-to-end tests that require a live server (run with: pytest -m e2e)
    slow: tests that are slow or resource-intensive
    desktop: tests that capture real screenshots or control the desktop
